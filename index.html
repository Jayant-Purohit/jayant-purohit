<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jayant Purohit</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: clamp(40px, 10vw, 100px);
      margin: 0;
    }

    .scroll-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      opacity: 0.7;
    }

    .wrapper {
      position: relative;
    }

    .sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .text {
      max-width: 700px;
      font-size: 22px;
      line-height: 1.8;
    }

    .word {
      opacity: 0.2;
      transition: opacity 0.2s;
    }

    .progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 4px;
      background: #fff;
      width: 0%;
    }

    a { color: #fff; text-decoration: none; }
  </style>
</head>

<body>

<header>
  <h1>Jayant Purohit</h1>
</header>

<div class="scroll-hint" id="hint">scroll to continue ↓</div>

<main>
  <section class="wrapper" id="wrapper">
    <div class="sticky">
      <p class="text" id="text"></p>
    </div>
  </section>

  <section style="padding:50px;text-align:center;">
    <p><a href="https://www.linkedin.com/in/jayant-purohit-715b0976" target="_blank">LinkedIn</a></p>
    <p><a href="mailto:dowebwithjay@gmail.com">dowebwithjay@gmail.com</a></p>
    <p><a href="tel:+919784483688">+91-9784483688</a></p>
  </section>
</main>

<div class="progress" id="progress"></div>

<script>
const TEXT = `Frontend Engineer with 7+ years of experience building scalable, high-performance applications across Web, iOS, and Smart TV platforms. Currently at BookMyShow, working with the Lead Generation & AdTech team to build products from scratch, focusing on scalable architecture, performance, and reliability. Previously worked with Retention & Loyalty teams, building user engagement and lifecycle-driven products. Strong expertise in React.js, Vue.js, UI architecture, and cross-platform development, with deep experience in integrating third-party libraries, analytics, and marketing tools. Earlier at App Mastery, led the UI team to deliver high-performance, QA-stable Smart TV applications for the US and Canada markets. Hands-on experience across the full Smart TV ecosystem—from building apps from scratch to app submission, maintenance, and subscription models. Experienced in architectural upgrades, team leadership, and end-to-end ownership including release management. Passionate about building future-proof systems and seamless user experiences.`;

const container = document.getElementById('text');
const wrapper = document.getElementById('wrapper');
const progressBar = document.getElementById('progress');
const hint = document.getElementById('hint');

const words = TEXT.split(' ');
const spans = [];

words.forEach(word => {
  const span = document.createElement('span');
  span.className = 'word';
  span.textContent = word + ' ';
  container.appendChild(span);
  spans.push(span);
});

let totalScroll = words.length * 25;
wrapper.style.height = totalScroll + window.innerHeight + 'px';

function update() {
  const rect = wrapper.getBoundingClientRect();
  const progress = Math.min(Math.max((window.innerHeight - rect.top) / (window.innerHeight + wrapper.offsetHeight), 0), 1);

  const index = progress * spans.length;

  spans.forEach((span, i) => {
    span.style.opacity = i < index ? 1 : 0.2;
  });

  progressBar.style.width = (progress * 100) + '%';

  const isAtEnd = window.scrollY + window.innerHeight >= document.documentElement.offsetHeight - 2;
  hint.style.opacity = isAtEnd ? '0' : '1';
  progressBar.style.opacity = isAtEnd ? '0' : '1';
}

window.addEventListener('scroll', update);
window.addEventListener('load', update);
</script>

</body>
</html>
